<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Editor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --panel: #ffffff;
      --panel-alt: #fbfcf9;
      --text: #202321;
      --muted: #626a66;
      --border: #d8ddd6;
      --border-strong: #b8c1ba;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --focus: #d88d1e;
      --code-bg: #eef2ee;
      --shadow: 0 10px 30px rgba(23, 31, 28, 0.08);
      --radius: 8px;
      --toolbar-height: 56px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.55;
      overflow-x: hidden;
    }

    button,
    select,
    textarea,
    input {
      font: inherit;
    }

    button,
    select {
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      padding: 0 10px;
      font-weight: 650;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    button:hover,
    select:hover {
      border-color: var(--border-strong);
      background: var(--panel-alt);
    }

    button:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    [contenteditable="true"]:focus-visible {
      outline: 3px solid rgba(216, 141, 30, 0.32);
      outline-offset: 2px;
    }

    button[aria-pressed="true"],
    button.is-active {
      border-color: rgba(15, 118, 110, 0.45);
      background: #e6f3f1;
      color: var(--accent-strong);
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100%;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: var(--toolbar-height);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(246, 247, 244, 0.96);
      backdrop-filter: blur(12px);
    }

    .brand {
      flex: 0 0 auto;
      font-weight: 760;
      color: #202321;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      width: 100%;
      overflow-x: auto;
      padding-bottom: 1px;
      scrollbar-width: thin;
    }

    .group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .group + .group {
      padding-left: 8px;
      border-left: 1px solid var(--border);
    }

    .segmented {
      display: inline-flex;
      min-height: 36px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--panel);
    }

    .segmented button {
      min-width: 84px;
      border: 0;
      border-radius: 0;
      background: transparent;
      font-weight: 700;
    }

    .segmented button + button {
      border-left: 1px solid var(--border);
    }

    .segmented button.is-active {
      background: var(--accent);
      color: #ffffff;
    }

    .format-select {
      width: 132px;
      padding: 0 30px 0 10px;
    }

    .workspace {
      --editor-width: 55%;
      display: grid;
      grid-template-columns: minmax(280px, var(--editor-width)) 12px minmax(280px, 1fr);
      column-gap: 0;
      row-gap: 14px;
      min-height: 0;
      padding: 14px;
    }

    .workspace.preview-hidden {
      grid-template-columns: minmax(0, 1fr);
    }

    .workspace.preview-hidden .pane-resizer {
      display: none;
    }

    .pane-resizer {
      position: relative;
      display: flex;
      align-items: stretch;
      justify-content: center;
      min-width: 12px;
      cursor: col-resize;
      touch-action: none;
      user-select: none;
    }

    .pane-resizer::before {
      content: "";
      width: 2px;
      margin: 10px 0;
      border-radius: 999px;
      background: var(--border-strong);
    }

    .pane-resizer:hover::before,
    .pane-resizer:focus-visible::before,
    .pane-resizer.is-dragging::before {
      width: 4px;
      background: var(--accent);
    }

    body.is-resizing {
      cursor: col-resize;
      user-select: none;
    }

    body.is-resizing .wysiwyg,
    body.is-resizing .markdown-editor,
    body.is-resizing .preview {
      pointer-events: none;
    }

    .editor-pane,
    .preview-pane {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .editor-pane {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .pane-status,
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .status-meta {
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      font-weight: 560;
    }

    .editor-wrap {
      min-height: 0;
      position: relative;
    }

    .wysiwyg,
    .markdown-editor {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - var(--toolbar-height) - 86px);
      padding: 24px;
      border: 0;
      border-radius: 0 0 var(--radius) var(--radius);
      background: var(--panel);
      color: var(--text);
      overflow: auto;
    }

    .markdown-editor {
      display: block;
      resize: none;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre;
      tab-size: 2;
    }

    .markdown-editor[hidden],
    .wysiwyg[hidden],
    .preview-pane[hidden] {
      display: none;
    }

    .wysiwyg:empty::before {
      content: attr(data-placeholder);
      color: #8a928e;
      pointer-events: none;
    }

    .wysiwyg h1,
    .wysiwyg h2,
    .wysiwyg h3,
    .preview h1,
    .preview h2,
    .preview h3 {
      line-height: 1.2;
      margin: 0.8em 0 0.35em;
    }

    .wysiwyg h1,
    .preview h1 {
      font-size: 2rem;
    }

    .wysiwyg h2,
    .preview h2 {
      font-size: 1.55rem;
    }

    .wysiwyg h3,
    .preview h3 {
      font-size: 1.25rem;
    }

    .wysiwyg h4,
    .wysiwyg h5,
    .wysiwyg h6,
    .preview h4,
    .preview h5,
    .preview h6 {
      margin: 0.8em 0 0.35em;
      line-height: 1.3;
    }

    .wysiwyg p,
    .preview p {
      margin: 0 0 0.8em;
    }

    .wysiwyg ul,
    .wysiwyg ol,
    .preview ul,
    .preview ol {
      margin: 0 0 0.9em;
      padding-left: 1.4em;
    }

    .wysiwyg blockquote,
    .preview blockquote {
      margin: 0.9em 0;
      padding: 0.2em 0 0.2em 1em;
      border-left: 4px solid var(--accent);
      color: #3f4743;
    }

    .wysiwyg pre,
    .preview pre {
      overflow: auto;
      margin: 1em 0;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--code-bg);
    }

    .wysiwyg code,
    .preview code {
      border-radius: 5px;
      background: var(--code-bg);
      padding: 0.12em 0.34em;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.92em;
    }

    .wysiwyg pre code,
    .preview pre code {
      padding: 0;
      border-radius: 0;
      background: transparent;
      white-space: pre;
    }

    .wysiwyg a,
    .preview a {
      color: var(--accent-strong);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .preview-pane {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .preview {
      min-height: 0;
      padding: 24px;
      overflow: auto;
      background: var(--panel);
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .preview-empty {
      color: #89918d;
    }

    .icon-text {
      min-width: 36px;
      font-size: 14px;
      line-height: 1;
    }

    .wide-button {
      min-width: 98px;
      gap: 6px;
      font-size: 13px;
    }

    @media (max-width: 940px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        width: 100%;
      }

      .workspace,
      .workspace.preview-hidden {
        grid-template-columns: minmax(0, 1fr);
        gap: 14px;
      }

      .pane-resizer {
        display: none;
      }

      .wysiwyg,
      .markdown-editor,
      .preview {
        min-height: 48vh;
      }
    }

    @media (max-width: 620px) {
      body {
        font-size: 14px;
      }

      .topbar {
        gap: 8px;
        padding: 8px;
      }

      .workspace {
        gap: 8px;
        padding: 8px;
      }

      .brand {
        font-size: 14px;
      }

      .group + .group {
        padding-left: 4px;
      }

      .segmented button {
        min-width: 72px;
        padding: 0 8px;
      }

      .format-select {
        width: 116px;
      }

      .wide-button {
        min-width: 84px;
        padding: 0 8px;
      }

      .wysiwyg,
      .markdown-editor,
      .preview {
        padding: 16px;
        min-height: 46vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">Markdown Editor</div>
      <nav class="toolbar" role="toolbar" aria-label="Editor toolbar">
        <div class="group" aria-label="Editor mode">
          <div class="segmented">
            <button type="button" id="wysiwygMode" class="is-active" aria-pressed="true">WYSIWYG</button>
            <button type="button" id="markdownMode" aria-pressed="false">Markdown</button>
          </div>
        </div>
        <div class="group" aria-label="Text style">
          <select id="formatBlock" class="format-select" title="Text style" aria-label="Text style">
            <option value="P">Text</option>
            <option value="H1">Heading 1</option>
            <option value="H2">Heading 2</option>
            <option value="H3">Heading 3</option>
            <option value="H4">Heading 4</option>
          </select>
          <button type="button" class="icon-text" data-action="bold" title="Bold" aria-label="Bold">B</button>
          <button type="button" class="icon-text" data-action="italic" title="Italic" aria-label="Italic"><em>I</em></button>
          <button type="button" class="icon-text" data-action="code" title="Inline code" aria-label="Inline code">&lt;/&gt;</button>
        </div>
        <div class="group" aria-label="Blocks">
          <button type="button" class="icon-text" data-action="unorderedList" title="Bulleted list" aria-label="Bulleted list">-</button>
          <button type="button" class="icon-text" data-action="orderedList" title="Numbered list" aria-label="Numbered list">1.</button>
          <button type="button" class="icon-text" data-action="blockquote" title="Blockquote" aria-label="Blockquote">&gt;</button>
          <button type="button" class="icon-text" data-action="codeBlock" title="Code block" aria-label="Code block">{}</button>
        </div>
        <div class="group" aria-label="Insert">
          <button type="button" class="icon-text" data-action="link" title="Link" aria-label="Link">[]</button>
        </div>
        <div class="group" aria-label="History">
          <button type="button" class="icon-text" data-action="undo" title="Undo (Ctrl/Cmd+Z)" aria-label="Undo">&lt;-</button>
          <button type="button" class="icon-text" data-action="redo" title="Redo (Ctrl/Cmd+Y or Ctrl/Cmd+Shift+Z)" aria-label="Redo">-&gt;</button>
        </div>
        <div class="group" aria-label="Preview">
          <button type="button" id="togglePreview" class="wide-button" aria-pressed="true" title="Hide preview">Preview</button>
        </div>
      </nav>
    </header>

    <main id="workspace" class="workspace">
      <section class="editor-pane" aria-label="Editor">
        <div class="pane-status">
          <span id="modeLabel">WYSIWYG</span>
          <span class="status-meta">
            <span id="wordCount">0 words</span>
            <span id="charCount">0 chars</span>
          </span>
        </div>
        <div class="editor-wrap">
          <div id="wysiwygEditor" class="wysiwyg" contenteditable="true" spellcheck="true" data-placeholder="Start writing"></div>
          <textarea id="markdownEditor" class="markdown-editor" spellcheck="false" placeholder="Start writing markdown" hidden></textarea>
        </div>
      </section>

      <div id="paneResizer" class="pane-resizer" role="separator" aria-label="Resize editor and preview panes" aria-orientation="vertical" aria-valuemin="25" aria-valuemax="75" aria-valuenow="55" tabindex="0"></div>

      <aside id="previewPane" class="preview-pane" aria-label="Markdown preview">
        <div class="preview-header">
          <span>Preview</span>
          <span id="previewStatus">Live</span>
        </div>
        <div id="preview" class="preview" aria-live="polite"></div>
      </aside>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      var markdownText = "";
      var activeMode = "wysiwyg";
      var previewVisible = true;
      var syncTimer = 0;
      var pendingModeSwitchAnchor = null;
      var latestEditorViewportAnchor = null;
      var viewportTrackTimer = 0;
      var historyStack = [];
      var historyIndex = -1;
      var maxHistoryEntries = 200;
      var isRestoringHistory = false;

      var workspace = document.getElementById("workspace");
      var wysiwygEditor = document.getElementById("wysiwygEditor");
      var markdownEditor = document.getElementById("markdownEditor");
      var preview = document.getElementById("preview");
      var previewPane = document.getElementById("previewPane");
      var paneResizer = document.getElementById("paneResizer");
      var wysiwygMode = document.getElementById("wysiwygMode");
      var markdownMode = document.getElementById("markdownMode");
      var modeLabel = document.getElementById("modeLabel");
      var wordCount = document.getElementById("wordCount");
      var charCount = document.getElementById("charCount");
      var formatBlock = document.getElementById("formatBlock");
      var togglePreview = document.getElementById("togglePreview");
      var previewStatus = document.getElementById("previewStatus");
      var toolbarButtons = Array.prototype.slice.call(document.querySelectorAll("[data-action]"));
      var undoButton = document.querySelector('[data-action="undo"]');
      var redoButton = document.querySelector('[data-action="redo"]');

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replace(/`/g, "&#96;");
      }

      function sanitizeUrl(value) {
        var url = String(value || "").trim();
        if (!url) {
          return "";
        }

        if (/^(https?:|mailto:|tel:)/i.test(url) || /^[#/]/.test(url)) {
          return url;
        }

        return "";
      }

      function createTokenStore() {
        var items = [];

        return {
          save: function (html) {
            var index = items.push(html) - 1;
            return "\u0000MDTOKEN" + index + "\u0000";
          },
          restore: function (html) {
            return html.replace(/\u0000MDTOKEN(\d+)\u0000/g, function (_, index) {
              return items[Number(index)] || "";
            });
          }
        };
      }

      function renderInline(value) {
        var tokens = createTokenStore();
        var text = String(value || "");

        text = text.replace(/`([^`\n]+)`/g, function (_, code) {
          return tokens.save("<code>" + escapeHtml(code) + "</code>");
        });

        text = text.replace(/\[([^\]\n]+)\]\(([^)\s]+)\)/g, function (match, label, href) {
          var safeHref = sanitizeUrl(href);
          if (!safeHref) {
            return match;
          }

          return tokens.save(
            '<a href="' + escapeAttribute(safeHref) + '" target="_blank" rel="noopener noreferrer">' +
            escapeHtml(label) +
            "</a>"
          );
        });

        text = escapeHtml(text);
        text = text.replace(/(\*\*|__)(.+?)\1/g, "<strong>$2</strong>");
        text = text.replace(/(^|[^\w*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
        text = text.replace(/(^|[^\w_])_([^_\n]+)_/g, "$1<em>$2</em>");

        return tokens.restore(text);
      }

      function isBlank(line) {
        return /^\s*$/.test(line);
      }

      function isBlockStart(line) {
        return (
          /^```/.test(line) ||
          /^(#{1,6})\s+/.test(line) ||
          /^>\s?/.test(line) ||
          /^\s*([-*+])\s+/.test(line) ||
          /^\s*\d+[.)]\s+/.test(line)
        );
      }

      function blockAttrs(lineIndex) {
        return ' data-md-line="' + Math.max(0, lineIndex) + '"';
      }

      function renderMarkdown(markdown, baseLine) {
        var lines = String(markdown || "").replace(/\r\n?/g, "\n").split("\n");
        var lineOffset = baseLine || 0;
        var html = [];
        var i = 0;

        while (i < lines.length) {
          var line = lines[i];

          if (isBlank(line)) {
            i += 1;
            continue;
          }

          var fence = line.match(/^```\s*([A-Za-z0-9_-]+)?\s*$/);
          if (fence) {
            var codeLines = [];
            var fenceLine = lineOffset + i;
            i += 1;
            while (i < lines.length && !/^```\s*$/.test(lines[i])) {
              codeLines.push(lines[i]);
              i += 1;
            }
            if (i < lines.length) {
              i += 1;
            }
            html.push("<pre" + blockAttrs(fenceLine) + "><code>" + codeLines.map(function (codeLine, index) {
              return "<span" + blockAttrs(fenceLine + index + 1) + ">" + escapeHtml(codeLine) + "</span>";
            }).join("\n") + "</code></pre>");
            continue;
          }

          var heading = line.match(/^(#{1,6})\s+(.+?)\s*#*\s*$/);
          if (heading) {
            var level = heading[1].length;
            html.push("<h" + level + blockAttrs(lineOffset + i) + ">" + renderInline(heading[2]) + "</h" + level + ">");
            i += 1;
            continue;
          }

          if (/^>\s?/.test(line)) {
            var quoteLines = [];
            var quoteLine = lineOffset + i;
            while (i < lines.length && (/^>\s?/.test(lines[i]) || isBlank(lines[i]))) {
              if (isBlank(lines[i])) {
                quoteLines.push("");
              } else {
                quoteLines.push(lines[i].replace(/^>\s?/, ""));
              }
              i += 1;
            }
            html.push("<blockquote" + blockAttrs(quoteLine) + ">" + renderMarkdown(quoteLines.join("\n"), quoteLine) + "</blockquote>");
            continue;
          }

          if (/^\s*([-*+])\s+/.test(line)) {
            var bulletItems = [];
            var bulletLine = lineOffset + i;
            while (i < lines.length && /^\s*([-*+])\s+/.test(lines[i])) {
              bulletItems.push({
                line: lineOffset + i,
                text: lines[i].replace(/^\s*([-*+])\s+/, "")
              });
              i += 1;
            }
            html.push("<ul" + blockAttrs(bulletLine) + ">" + bulletItems.map(function (item) {
              return "<li" + blockAttrs(item.line) + ">" + renderInline(item.text) + "</li>";
            }).join("") + "</ul>");
            continue;
          }

          if (/^\s*\d+[.)]\s+/.test(line)) {
            var orderedItems = [];
            var orderedLine = lineOffset + i;
            while (i < lines.length && /^\s*\d+[.)]\s+/.test(lines[i])) {
              orderedItems.push({
                line: lineOffset + i,
                text: lines[i].replace(/^\s*\d+[.)]\s+/, "")
              });
              i += 1;
            }
            html.push("<ol" + blockAttrs(orderedLine) + ">" + orderedItems.map(function (item) {
              return "<li" + blockAttrs(item.line) + ">" + renderInline(item.text) + "</li>";
            }).join("") + "</ol>");
            continue;
          }

          var paragraph = [];
          var paragraphLine = lineOffset + i;
          while (i < lines.length && !isBlank(lines[i]) && !isBlockStart(lines[i])) {
            paragraph.push(lines[i]);
            i += 1;
          }

          if (paragraph.length) {
            html.push("<p" + blockAttrs(paragraphLine) + ">" + paragraph.map(function (paragraphText, index) {
              return "<span" + blockAttrs(paragraphLine + index) + ">" + renderInline(paragraphText) + "</span>";
            }).join("<br>") + "</p>");
          } else {
            i += 1;
          }
        }

        return html.join("\n");
      }

      function textContent(node) {
        return node.textContent || "";
      }

      function cleanMarkdownSpacing(value) {
        return String(value || "")
          .replace(/\u00a0/g, " ")
          .replace(/[ \t]+\n/g, "\n")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function inlineNodesToMarkdown(node) {
        var output = "";
        Array.prototype.forEach.call(node.childNodes, function (child) {
          output += nodeToMarkdown(child, true);
        });
        return output;
      }

      function isMarkdownBlockElement(node) {
        if (node.nodeType !== Node.ELEMENT_NODE) {
          return false;
        }

        return /^(blockquote|div|h[1-6]|li|ol|p|pre|section|article|ul)$/i.test(node.tagName);
      }

      function hasMarkdownBlockChildren(node) {
        return Array.prototype.some.call(node.childNodes, isMarkdownBlockElement);
      }

      function blockChildrenToMarkdown(node, depth) {
        var parts = [];
        var inlineBuffer = "";

        function flushInlineBuffer() {
          var inline = inlineBuffer.trim();
          if (inline) {
            parts.push(inline);
          }
          inlineBuffer = "";
        }

        Array.prototype.forEach.call(node.childNodes, function (child) {
          if (!isMarkdownBlockElement(child)) {
            inlineBuffer += nodeToMarkdown(child, true);
            return;
          }

          flushInlineBuffer();
          var rendered = nodeToMarkdown(child, false, depth);
          if (rendered.trim()) {
            parts.push(rendered.trim());
          }
        });

          execWysiwyg("insertOrderedList");
        } else if (action === "blockquote") {
          execWysiwyg("formatBlock", "BLOCKQUOTE");
        } else if (action === "codeBlock") {
          execWysiwyg("formatBlock", "PRE");
        } else if (action === "code") {
          wrapWysiwygSelectionWithCode();
        } else if (action === "link") {
          createWysiwygLink();
        }
      }

      function createWysiwygLink() {
        var url = window.prompt("URL");
        if (!url) {
          return;
        }

        var safeUrl = sanitizeUrl(url);
        if (!safeUrl) {
          return;
        }

        execWysiwyg("createLink", safeUrl);
      }

      function wrapWysiwygSelectionWithCode() {
        wysiwygEditor.focus();
        var selection = window.getSelection();
        if (!selection || selection.rangeCount === 0) {
          return;
        }

        var range = selection.getRangeAt(0);
        if (range.collapsed) {
          var code = document.createElement("code");
          code.textContent = "code";
          range.insertNode(code);
          range.selectNodeContents(code);
          selection.removeAllRanges();
          selection.addRange(range);
        } else {
          var wrapper = document.createElement("code");
          try {
            range.surroundContents(wrapper);
          } catch (error) {
            var fragment = range.extractContents();
            wrapper.appendChild(fragment);
            range.insertNode(wrapper);
          }
        }
        scheduleSyncFromWysiwyg();
      }

      function insertTextIntoTextarea(text) {
        var range = selectedTextareaRange();
        markdownEditor.setRangeText(text, range.start, range.end, "end");
        setMarkdown(markdownEditor.value, "textarea");
      }

      function insertHtmlAtSelection(html) {
        wysiwygEditor.focus();
        document.execCommand("insertHTML", false, html);
        scheduleSyncFromWysiwyg();
      }

      function updateFormatSelect() {
        if (activeMode !== "wysiwyg") {
          return;
        }

        var block = document.queryCommandValue("formatBlock");
        var normalized = String(block || "P").replace(/[<>]/g, "").toUpperCase();
        if (!/^(P|H1|H2|H3|H4)$/.test(normalized)) {
          normalized = "P";
        }
        formatBlock.value = normalized;
      }

      function isWideLayout() {
        return window.matchMedia("(min-width: 941px)").matches;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function updateResizerValue(leftWidth) {
        var rect = workspace.getBoundingClientRect();
        var resizerWidth = paneResizer.offsetWidth || 12;
        var available = Math.max(rect.width - resizerWidth, 1);
        var percent = Math.round((leftWidth / available) * 100);

        paneResizer.setAttribute("aria-valuenow", String(clamp(percent, 25, 75)));
      }

      function setEditorWidth(leftWidth) {
        if (!previewVisible || !isWideLayout()) {
          return;
        }

        var rect = workspace.getBoundingClientRect();
        var resizerWidth = paneResizer.offsetWidth || 12;
        var available = Math.max(rect.width - resizerWidth, 1);
        var minEditor = Math.min(320, available * 0.7);
        var minPreview = Math.min(320, available * 0.7);
        var minWidth = Math.min(minEditor, available * 0.45);
        var maxWidth = Math.max(minWidth, available - minPreview);
        var nextWidth = clamp(leftWidth, minWidth, maxWidth);

        workspace.style.setProperty("--editor-width", nextWidth + "px");
        updateResizerValue(nextWidth);
      }

      function resizeFromPointer(clientX) {
        var rect = workspace.getBoundingClientRect();
        setEditorWidth(clientX - rect.left);
      }

      function resizeByKeyboard(delta) {
        var rect = workspace.getBoundingClientRect();
        var currentWidth = workspace.querySelector(".editor-pane").getBoundingClientRect().width;
        var resizerWidth = paneResizer.offsetWidth || 12;

        if (delta === "home") {
          setEditorWidth((rect.width - resizerWidth) * 0.35);
        } else if (delta === "end") {
          setEditorWidth((rect.width - resizerWidth) * 0.65);
        } else {
          setEditorWidth(currentWidth + delta);
        }
      }

      wysiwygMode.addEventListener("pointerdown", prepareModeSwitchAnchor);
      markdownMode.addEventListener("pointerdown", prepareModeSwitchAnchor);

      wysiwygMode.addEventListener("click", function () {
        switchMode("wysiwyg");
      });

      markdownMode.addEventListener("click", function () {
        switchMode("markdown");
      });

      togglePreview.addEventListener("click", function () {
        previewVisible = !previewVisible;
        previewPane.hidden = !previewVisible;
        workspace.classList.toggle("preview-hidden", !previewVisible);
        togglePreview.setAttribute("aria-pressed", String(previewVisible));
        togglePreview.title = previewVisible ? "Hide preview" : "Show preview";
        previewStatus.textContent = previewVisible ? "Live" : "Hidden";
      });

      paneResizer.addEventListener("pointerdown", function (event) {
        if (!previewVisible || !isWideLayout()) {
          return;
        }

        event.preventDefault();
        paneResizer.setPointerCapture(event.pointerId);
        paneResizer.classList.add("is-dragging");
        document.body.classList.add("is-resizing");
        resizeFromPointer(event.clientX);
      });

      paneResizer.addEventListener("pointermove", function (event) {
        if (!paneResizer.classList.contains("is-dragging")) {
          return;
        }

        event.preventDefault();
        resizeFromPointer(event.clientX);
      });

      paneResizer.addEventListener("pointerup", function (event) {
        paneResizer.classList.remove("is-dragging");
        document.body.classList.remove("is-resizing");

        if (paneResizer.hasPointerCapture(event.pointerId)) {
          paneResizer.releasePointerCapture(event.pointerId);
        }
      });

      paneResizer.addEventListener("pointercancel", function (event) {
        paneResizer.classList.remove("is-dragging");
        document.body.classList.remove("is-resizing");

        if (paneResizer.hasPointerCapture(event.pointerId)) {
          paneResizer.releasePointerCapture(event.pointerId);
        }
      });

      paneResizer.addEventListener("keydown", function (event) {
        if (!previewVisible || !isWideLayout()) {
          return;
        }

        if (event.key === "ArrowLeft") {
          event.preventDefault();
          resizeByKeyboard(-32);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          resizeByKeyboard(32);
        } else if (event.key === "Home") {
          event.preventDefault();
          resizeByKeyboard("home");
        } else if (event.key === "End") {
          event.preventDefault();
          resizeByKeyboard("end");
        }
      });

      formatBlock.addEventListener("change", function () {
        if (activeMode === "markdown") {
          applyMarkdownFormat(formatBlock.value);
          return;
        }
        execWysiwyg("formatBlock", formatBlock.value);
      });

      toolbarButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          applyToolbarAction(button.getAttribute("data-action"));
        });
      });

      window.addEventListener("scroll", scheduleViewportTracking, { passive: true });
      wysiwygEditor.addEventListener("scroll", scheduleViewportTracking, { passive: true });
      markdownEditor.addEventListener("scroll", scheduleViewportTracking, { passive: true });

      wysiwygEditor.addEventListener("input", scheduleSyncFromWysiwyg);
      wysiwygEditor.addEventListener("keyup", updateFormatSelect);
      wysiwygEditor.addEventListener("mouseup", updateFormatSelect);

      wysiwygEditor.addEventListener("paste", function (event) {
        var data = event.clipboardData;
        if (!data) {
          return;
        }

        var html = data.getData("text/html");
        var text = data.getData("text/plain");
        event.preventDefault();

        if (html) {
          insertHtmlAtSelection(sanitizePastedHtml(html));
        } else if (text) {
          document.execCommand("insertText", false, text);
          scheduleSyncFromWysiwyg();
        }
      });

      markdownEditor.addEventListener("input", function () {
        setMarkdown(markdownEditor.value, "textarea");
      });

      markdownEditor.addEventListener("paste", function (event) {
        var data = event.clipboardData;
        if (!data) {
          return;
        }

        event.preventDefault();
        insertTextIntoTextarea(data.getData("text/plain") || "");
      });

      document.addEventListener("selectionchange", updateFormatSelect);

      document.addEventListener("keydown", function (event) {
        var isModifier = event.metaKey || event.ctrlKey;
        if (!isModifier) {
          return;
        }

        var key = event.key.toLowerCase();

        if (key === "z" && !event.altKey) {
          event.preventDefault();
          applyHistoryStep(event.shiftKey ? 1 : -1);
        } else if (key === "y" && !event.altKey) {
          event.preventDefault();
          applyHistoryStep(1);
        } else if (key === "b") {
          event.preventDefault();
          applyToolbarAction("bold");
        } else if (key === "i") {
          event.preventDefault();
          applyToolbarAction("italic");
        }
      });

      setMarkdown("", "init", { history: false });
      recordHistory("");
      updateModeControls();
      updateResizerValue(workspace.querySelector(".editor-pane").getBoundingClientRect().width);
      rememberEditorViewport();
      focusActiveEditor();
    })();
  </script>
</body>
</html>
