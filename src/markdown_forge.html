<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Forge</title>
  <link rel="icon" href="../assets/MarkdownForge.ico" sizes="any">
  <link rel="shortcut icon" href="../assets/MarkdownForge.ico">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="toolbar-row file-toolbar" role="toolbar" aria-label="File toolbar">
        <div class="brand">Markdown Forge</div>
        <div id="documentTitle" class="document-title" aria-live="polite">Untitled.md</div>
        <div class="group" aria-label="File">
          <button type="button" id="newFile" class="file-button" title="New document (Ctrl/Cmd+N)">New</button>
          <button type="button" id="openFile" class="file-button" title="Open Markdown file (Ctrl/Cmd+O)">Open</button>
          <button type="button" id="saveFile" class="file-button" title="Save document (Ctrl/Cmd+S)">Save</button>
          <button type="button" id="saveAsFile" class="file-button" title="Save document as (Ctrl/Cmd+Shift+S)">Save As</button>
          <select id="recentFiles" class="recent-select" title="Recent files" aria-label="Recent files">
            <option value="">Recent</option>
          </select>
        </div>
      </div>
      <nav class="toolbar" role="toolbar" aria-label="Editor toolbar">
        <div class="group" aria-label="Editor mode">
          <div class="segmented">
            <button type="button" id="wysiwygMode" class="is-active" aria-pressed="true">WYSIWYG</button>
            <button type="button" id="markdownMode" aria-pressed="false">Markdown</button>
          </div>
        </div>
        <div class="group" aria-label="Text style">
          <select id="formatBlock" class="format-select" title="Text style" aria-label="Text style">
            <option value="P">Text</option>
            <option value="H1">Heading 1</option>
            <option value="H2">Heading 2</option>
            <option value="H3">Heading 3</option>
            <option value="H4">Heading 4</option>
          </select>
          <button type="button" class="icon-text" data-action="bold" title="Bold" aria-label="Bold">B</button>
          <button type="button" class="icon-text" data-action="italic" title="Italic" aria-label="Italic"><em>I</em></button>
          <button type="button" class="icon-text" data-action="code" title="Inline code" aria-label="Inline code">&lt;/&gt;</button>
        </div>
        <div class="group" aria-label="Blocks">
          <button type="button" class="icon-text" data-action="unorderedList" title="Bulleted list" aria-label="Bulleted list">-</button>
          <button type="button" class="icon-text" data-action="orderedList" title="Numbered list" aria-label="Numbered list">1.</button>
          <button type="button" class="icon-text" data-action="blockquote" title="Blockquote" aria-label="Blockquote">&gt;</button>
          <button type="button" class="icon-text" data-action="codeBlock" title="Code block" aria-label="Code block">{}</button>
        </div>
        <div class="group" aria-label="Insert">
          <button type="button" class="icon-text" data-action="link" title="Link" aria-label="Link">[]</button>
          <button type="button" class="icon-text" data-action="image" title="Insert image" aria-label="Insert image">Img</button>
        </div>
        <div class="group" aria-label="History">
          <button type="button" class="icon-text" data-action="undo" title="Undo (Ctrl/Cmd+Z)" aria-label="Undo">&lt;-</button>
          <button type="button" class="icon-text" data-action="redo" title="Redo (Ctrl/Cmd+Y or Ctrl/Cmd+Shift+Z)" aria-label="Redo">-&gt;</button>
        </div>
        <div class="group" aria-label="Preview">
          <button type="button" id="togglePreview" class="wide-button" aria-pressed="true" title="Hide preview">Preview</button>
        </div>
        <div class="group" aria-label="About">
          <button type="button" id="aboutButton" class="wide-button" title="About Markdown Forge" aria-label="About Markdown Forge">About</button>
        </div>
      </nav>
      <div class="tab-strip" aria-label="Open documents">
        <button type="button" id="tabScrollLeft" class="tab-scroll-button" title="Scroll tabs left" aria-label="Scroll tabs left">&lt;</button>
        <div id="tabViewport" class="tab-viewport">
          <div id="tabList" class="tab-list" role="tablist" aria-label="Open documents"></div>
        </div>
        <button type="button" id="tabScrollRight" class="tab-scroll-button" title="Scroll tabs right" aria-label="Scroll tabs right">&gt;</button>
        <button type="button" id="newTabButton" class="tab-new-button" title="New tab (Ctrl/Cmd+N)" aria-label="New tab">+</button>
      </div>
    </header>

    <main id="workspace" class="workspace">
      <section class="editor-pane" aria-label="Editor">
        <div class="pane-status">
          <span id="modeLabel">WYSIWYG</span>
          <span class="status-meta">
            <span id="wordCount">0 words</span>
            <span id="charCount">0 chars</span>
          </span>
        </div>
        <div class="editor-wrap">
          <div id="wysiwygEditor" class="wysiwyg" contenteditable="true" spellcheck="true" data-placeholder="Start writing"></div>
          <textarea id="markdownEditor" class="markdown-editor" spellcheck="false" placeholder="Start writing markdown" hidden></textarea>
        </div>
      </section>

      <div id="paneResizer" class="pane-resizer" role="separator" aria-label="Resize editor and preview panes" aria-orientation="vertical" aria-valuemin="25" aria-valuemax="75" aria-valuenow="55" tabindex="0"></div>

      <aside id="previewPane" class="preview-pane" aria-label="Markdown preview">
        <div class="preview-header">
          <span>Preview</span>
          <span id="previewStatus">Live</span>
        </div>
        <div id="preview" class="preview" aria-live="polite"></div>
      </aside>
    </main>

    <div id="aboutOverlay" class="about-overlay" hidden>
      <div class="about-dialog" role="dialog" aria-modal="true" aria-labelledby="aboutTitle" aria-describedby="aboutBody" tabindex="-1">
        <div class="about-header">
          <h2 id="aboutTitle">About Markdown Forge</h2>
          <button type="button" id="aboutClose" class="icon-text about-close" aria-label="Close about dialog">×</button>
        </div>
        <div id="aboutBody" class="about-body">
          <p>Markdown Forge is a local, browser-based Markdown editor.</p>
          <p>Author: deepkh</p>
          <p>GitHub repository: <a href="https://github.com/deepkh/MarkdownForge" target="_blank" rel="noreferrer noopener">https://github.com/deepkh/MarkdownForge</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/history.js"></script>
  <script src="js/document-session.js"></script>
  <script src="js/tab-manager.js"></script>
  <script src="js/file-store.js"></script>
  <script src="js/asset-store.js"></script>
  <script src="js/recent-files.js"></script>
  <script src="js/viewport.js"></script>
  <script src="js/editor-actions.js"></script>
  <script src="js/resizer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
